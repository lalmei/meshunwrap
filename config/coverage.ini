
[run]
branch = true
parallel = true
source =
  src/meshunwrap
data_file = .coverage
omit =
  src/meshunwrap/__init__.py
  src/meshunwrap/__main__.py
  tests/__init__.py
  tests/conftest.py

[paths]
equivalent =
  src/
  .venv/lib/*/site-packages/
  .venvs/*/lib/*/site-packages/

[report]
format = text
precision = 2
fail_under = 70
show_missing = true
skip_covered = false
sort = Cover
exclude_lines =
  pragma: no cover
  if TYPE_CHECKING:
  if __name__ == .__main__.:
  class .*\(Protocol\):
  @(abc\.)?abstractmethod

[html]
directory = htmlcov
title = meshunwrap Coverage Report
show_contexts = true

[xml]
output = coverage.xml

[json]
output = coverage.json
